<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Profile — AppointCare</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/sidebars :: sidebar-doctor}"></div>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">My Profile</div></div>
    <div class="page-body">
      <div class="card" style="max-width:520px;">
        <div class="card-header"><h3>Doctor Profile</h3></div>
        <div class="card-body">
          <div style="display:flex;align-items:center;gap:1.25rem;margin-bottom:1.5rem;">
            <div class="doc-avatar" style="width:64px;height:64px;font-size:1.5rem;background:linear-gradient(135deg,var(--teal),var(--teal-mid));"
                 th:text="${#strings.substring(doctor.name,0,1).toUpperCase()}">D</div>
            <div>
              <div style="font-family:'Playfair Display',serif;font-size:1.2rem;" th:text="${doctor.name}">Name</div>
              <div style="color:var(--accent);font-weight:600;font-size:0.85rem;" th:text="${doctor.specialization}">Spec</div>
              <div class="text-muted" th:text="${doctor.qualification}">Qual</div>
            </div>
          </div>
          <div class="form-group"><label>Email</label><input class="form-control" th:value="${doctor.email}" disabled/></div>
          <div class="form-group"><label>Phone</label><input class="form-control" th:value="${doctor.phone}" disabled/></div>
          <div class="form-group"><label>Hospital</label><input class="form-control" th:value="${doctor.hospital}" disabled/></div>
          <div class="form-group">
            <label>Consultation Fee</label>
            <input class="form-control" th:value="'₹' + ${doctor.consultationFee}" disabled/>
          </div>
          <p class="text-muted" style="font-size:0.8rem;margin-top:0.5rem;">Contact admin to update profile details.</p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
