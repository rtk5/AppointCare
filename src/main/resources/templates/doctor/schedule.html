<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Schedule — AppointCare</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/sidebars :: sidebar-doctor}"></div>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">Manage Schedule</div></div>
    <div class="page-body">
      <div class="breadcrumb"><a th:href="@{/doctor/dashboard}">Dashboard</a><span>›</span> Schedule</div>
      <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
      <div th:if="${error}"   class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

      <div style="display:grid;grid-template-columns:320px 1fr;gap:1.5rem;">

        <!-- Add Slot Form -->
        <div>
          <div class="card">
            <div class="card-header"><h3>Add Time Slot</h3></div>
            <div class="card-body">
              <form th:action="@{/doctor/schedule/add}" method="post">
                <div class="form-group">
                  <label>Date</label>
                  <input type="date" name="date" class="form-control" required
                         th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"/>
                </div>
                <div class="form-group">
                  <label>Time</label>
                  <input type="time" name="time" class="form-control" required/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">+ Add Slot</button>
              </form>
            </div>
          </div>
        </div>

        <!-- Slot List -->
        <div>
          <div class="card">
            <div class="card-header">
              <h3>All Slots</h3>
              <span class="text-muted" th:text="${#lists.size(slots)} + ' slots'"></span>
            </div>
            <div th:if="${#lists.isEmpty(slots)}" class="empty-state" style="padding:2rem;">
              <div class="icon">🗓️</div><p>No slots added yet.</p>
            </div>
            <div class="table-wrap" th:if="${!#lists.isEmpty(slots)}">
              <table>
                <thead><tr><th>Date</th><th>Time</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                  <tr th:each="slot : ${slots}">
                    <td th:text="${slot.availableDate}">Date</td>
                    <td th:text="${slot.availableTime}">Time</td>
                    <td>
                      <span th:if="${slot.booked}"  class="badge badge-approved">Booked</span>
                      <span th:if="${!slot.booked}" class="badge badge-pending" style="background:var(--teal-light);color:var(--teal-dark);">Available</span>
                    </td>
                    <td>
                      <form th:if="${!slot.booked}"
                            th:action="@{/doctor/schedule/{id}/delete(id=${slot.scheduleId})}"
                            method="post" style="display:inline;">
                        <button type="submit" class="btn btn-danger btn-sm"
                                data-confirm="Remove this slot?">✕ Remove</button>
                      </form>
                      <span th:if="${slot.booked}" class="text-muted" style="font-size:0.8rem;">Booked</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
