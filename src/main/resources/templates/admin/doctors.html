<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Doctors — AppointCare</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/sidebars :: sidebar-admin}"></div>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">Manage Doctors</div></div>
    <div class="page-body">
      <div class="breadcrumb"><a th:href="@{/admin/dashboard}">Dashboard</a><span>›</span> Doctors</div>
      <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
      <div th:if="${error}"   class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

      <div style="display:grid;grid-template-columns:360px 1fr;gap:1.5rem;">

        <!-- Add Doctor Form -->
        <div>
          <div class="card">
            <div class="card-header"><h3>Add New Doctor</h3></div>
            <div class="card-body">
              <form th:action="@{/admin/doctors/add}" method="post" th:object="${registerDto}">
                <div class="form-group">
                  <label>Full Name</label>
                  <input type="text" name="name" class="form-control" placeholder="Dr. Full Name" required/>
                </div>
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" name="email" class="form-control" placeholder="doctor@clinic.com" required/>
                </div>
                <div class="form-group">
                  <label>Phone</label>
                  <input type="text" name="phone" class="form-control" placeholder="10-digit number" required/>
                </div>
                <div class="form-group">
                  <label>Password</label>
                  <input type="password" name="password" class="form-control" placeholder="Set password" required/>
                </div>
                <div class="form-group">
                  <label>Specialization</label>
                  <input type="text" name="specialization" class="form-control" placeholder="e.g. Cardiology" required/>
                </div>
                <div class="form-group">
                  <label>Qualification</label>
                  <input type="text" name="qualification" class="form-control" placeholder="e.g. MD, MBBS" required/>
                </div>
                <div class="form-group">
                  <label>Hospital / Clinic</label>
                  <input type="text" name="hospital" class="form-control" placeholder="Hospital name" required/>
                </div>
                <div class="form-group">
                  <label>Consultation Fee (₹)</label>
                  <input type="number" name="consultationFee" class="form-control" placeholder="500" required/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">+ Add Doctor</button>
              </form>
            </div>
          </div>
        </div>

        <!-- Doctors Table -->
        <div>
          <div class="card">
            <div class="card-header">
              <h3>All Doctors</h3>
              <span class="text-muted" th:text="${#lists.size(doctors)} + ' registered'"></span>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>#</th><th>Name</th><th>Specialization</th><th>Hospital</th><th>Fee</th><th>Action</th></tr></thead>
                <tbody>
                  <tr th:each="doc : ${doctors}">
                    <td th:text="${doc.userId}">#</td>
                    <td>
                      <div style="font-weight:600;" th:text="${doc.name}">Name</div>
                      <div style="font-size:0.78rem;color:var(--text-light);" th:text="${doc.email}">email</div>
                    </td>
                    <td th:text="${doc.specialization}">Spec</td>
                    <td th:text="${doc.hospital}">Hospital</td>
                    <td th:text="'₹' + ${doc.consultationFee}">Fee</td>
                    <td>
                      <form th:action="@{/admin/doctors/{id}/remove(id=${doc.userId})}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm"
                                data-confirm="Remove this doctor from the system?">✕ Remove</button>
                      </form>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
