<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>All Appointments — AppointCare</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/sidebars :: sidebar-admin}"></div>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">All Appointments</div></div>
    <div class="page-body">
      <div class="breadcrumb"><a th:href="@{/admin/dashboard}">Dashboard</a><span>›</span> Appointments</div>

      <!-- Filter -->
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.25rem;">
        <a th:href="@{/admin/appointments}" class="btn btn-sm"
           th:classappend="${selectedStatus == null ? 'btn-primary' : 'btn-outline'}">All</a>
        <a th:each="s : ${statuses}"
           th:href="@{/admin/appointments(status=${s})}"
           class="btn btn-sm"
           th:classappend="${selectedStatus == s.name() ? 'btn-primary' : 'btn-outline'}"
           th:text="${s}">Status</a>
      </div>

      <div class="card">
        <div th:if="${#lists.isEmpty(appointments)}" class="empty-state" style="padding:2rem;">
          <div class="icon">📭</div><p>No appointments found.</p>
        </div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(appointments)}">
          <table>
            <thead><tr><th>#</th><th>Patient</th><th>Doctor</th><th>Specialization</th><th>Date</th><th>Time</th><th>Reason</th><th>Status</th></tr></thead>
            <tbody>
              <tr th:each="a : ${appointments}">
                <td th:text="${a.appointmentId}">#</td>
                <td th:text="${a.patient.name}">Patient</td>
                <td th:text="${a.doctor.name}">Doctor</td>
                <td th:text="${a.doctor.specialization}">Spec</td>
                <td th:text="${a.date}">Date</td>
                <td th:text="${a.time}">Time</td>
                <td style="font-size:0.85rem;max-width:140px;" th:text="${a.reason}">Reason</td>
                <td><span th:class="'badge badge-' + ${a.status.name().toLowerCase()}" th:text="${a.status}"></span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
